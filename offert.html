<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offert — Tegel och Hatt</title>
  <link rel="stylesheet" href="https://use.typekit.net/ekp3zqm.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f5;
      color: #000;
      font-family: 'acumin-pro', 'Acumin Pro', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      font-size: 16px;
    }

    /* Introsida */
    .intro {
      position: relative;
      height: 100vh;
      background-image: url('https://www.tegelochhatt.se/app/uploads/2024/09/intromock_1528x1080.webp');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 56px;
    }

    .intro::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%);
    }

    .intro-logo {
      position: absolute;
      top: 64px;
      left: 72px;
      z-index: 2;
      height: 56px;
    }

    .intro-text {
      position: relative;
      z-index: 2;
      padding-bottom: 16px;
    }

    .intro-text h1 {
      font-family: 'Bodoni 72', 'Bodoni72', 'Didot', Georgia, serif;
      font-weight: 400;
      font-size: 4.5rem;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .intro-text p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-top: 12px;
      letter-spacing: 0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    /* Vänster: bild + varumärke */
    .sido-panel {
      position: sticky;
      top: 0;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sido-bild {
      flex: 1;
      background-image: url('https://www.tegelochhatt.se/app/uploads/2024/09/tegel-och-hatt-2023-10_1528x1080.webp');
      background-size: cover;
      background-position: center;
      opacity: 0.75;
    }

    .sido-footer {
      padding: 32px;
      background: #000;
    }

    .sido-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .sido-logo img {
      height: 56px;
      filter: invert(0);
    }

    .sido-tagline {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    /* Höger: offert-innehåll */
    .offert-panel {
      padding: 64px 56px;
      max-width: 720px;
    }

    .offert-status-chip {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 32px;
      background: #f0f0f0;
      color: #888;
    }
    .chip-skickad { background: #e8eeff; color: #3a4a8b; }
    .chip-godkand { background: #a5a6f6; color: #fff; }

    .offert-rubrik {
      font-family: 'Bodoni 72', 'Bodoni72', 'Didot', Georgia, serif;
      font-weight: 400;
      font-size: 2.8rem;
      line-height: 1.15;
      margin-bottom: 8px;
      color: #000;
    }

    .offert-kund {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 48px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 32px 0;
    }

    .meddelande {
      font-size: 1rem;
      line-height: 1.75;
      color: #333;
      margin-bottom: 40px;
    }

    .rader-rubrik {
      display: grid;
      grid-template-columns: 32px 1fr 150px 32px;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #aaa;
      padding-bottom: 10px;
      border-bottom: 1px solid #e8e8e8;
      margin-bottom: 4px;
    }

    .rad {
      display: grid;
      grid-template-columns: 32px 1fr 150px 32px;
      gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
      align-items: center;
      transition: opacity 0.15s;
    }

    .rad.inaktiv { opacity: 0.35; }
    .rad.inaktiv .rad-beskrivning { text-decoration: line-through; }

    .rad-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #000;
    }

    .rad-belopp { text-align: right; color: #555; }

    .rad-ta-bort {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0;
      text-align: center;
    }
    .rad.ny .rad-ta-bort { color: #bbb; }
    .rad-ta-bort:hover { color: #fd804b; }

    .btn-lagg-till {
      background: none;
      border: 1px dashed #ddd;
      border-radius: 6px;
      color: #888;
      padding: 8px 16px;
      font-family: 'acumin-pro', 'Acumin Pro', Helvetica, Arial, sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
    }
    .btn-lagg-till:hover { border-color: #fd804b; color: #fd804b; }

    .ny-rad-form {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 8px;
      margin-top: 8px;
    }
    .ny-rad-form input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: 'acumin-pro', 'Acumin Pro', Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
    }
    .ny-rad-form input:focus { outline: none; border-color: #000; }

    .totalt-rad {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 2px solid #000;
    }

    .totalt-label {
      font-family: 'Bodoni 72', 'Bodoni72', 'Didot', Georgia, serif;
      font-weight: 400;
      font-size: 1.3rem;
    }

    .totalt-belopp {
      font-family: 'Bodoni 72', 'Bodoni72', 'Didot', Georgia, serif;
      font-weight: 400;
      font-size: 1.8rem;
      color: #000;
    }

    /* Dekobild */
    .deko-bild {
      width: 100%;
      border-radius: 10px;
      margin: 40px 0;
      overflow: hidden;
      height: 200px;
    }

    .deko-bild img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Godkänn-sektion */
    .godkann-sektion {
      margin-top: 48px;
      padding: 40px;
      background: #f9f9f9;
      border-radius: 12px;
      text-align: center;
    }

    .godkann-sektion p {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn-godkann {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 48px;
      font-family: 'acumin-pro', 'Acumin Pro', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-godkann:hover { background: #fd804b; }

    .godkand-banner {
      background: #a5a6f6;
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      margin-top: 48px;
    }
    .godkand-banner h3 {
      font-family: 'Bodoni 72', 'Bodoni72', 'Didot', Georgia, serif;
      font-weight: 400;
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .godkand-banner p { font-size: 0.9rem; color: rgba(255,255,255,0.85); }

    .laddning { text-align: center; padding: 80px 32px; color: #888; font-size: 0.9rem; }
    .fel { text-align: center; padding: 80px 32px; color: #fd804b; }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      .sido-panel { position: relative; height: 260px; }
      .sido-bild { flex: 1; }
      .offert-panel { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<div class="intro">
  <img class="intro-logo" src="https://www.tegelochhatt.se/app/themes/tegel-o-hatt//assets/images/logo_white.svg" alt="Tegel och Hatt" />
  <div class="intro-text">
    <h1>Offert</h1>
    <p id="intro-nummer">Laddar…</p>
  </div>
</div>

<div class="layout">
  <!-- Vänster panel -->
  <aside class="sido-panel">
    <div class="sido-bild"></div>
    <div class="sido-footer">
      <div class="sido-logo">
        <img src="https://www.tegelochhatt.se/app/themes/tegel-o-hatt//assets/images/logo_white.svg" alt="Tegel och Hatt" />
      </div>
    </div>
  </aside>

  <!-- Höger panel -->
  <main class="offert-panel" id="offert-panel">
    <div class="laddning">Laddar offert…</div>
  </main>
</div>

<script>
  const URL = 'https://wehordecxgpxxjagbtuj.supabase.co';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlaG9yZGVjeGdweHhqYWdidHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTk5MjMsImV4cCI6MjA5MDA5NTkyM30.omrBD5LvuICkdKIfhNFGv2dv1U6Wl_lJS1AE3ggWw0E';
  const headers = { 'Content-Type': 'application/json', 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };

  const id = new URLSearchParams(window.location.search).get('id');

  async function ladda() {
    if (!id) { visaFel('Ingen offert hittades.'); return; }
    const res = await fetch(`${URL}/rest/v1/projekt?id=eq.${id}&select=*`, { headers });
    const [p] = await res.json();
    if (!p) { visaFel('Offerten kunde inte hittas.'); return; }
    rendera(p);
  }

  function chipHTML(status) {
    if (status === 'skickad') return '<span class="offert-status-chip chip-skickad">Offert skickad</span>';
    if (status === 'godkand') return '<span class="offert-status-chip chip-godkand">Godkänd</span>';
    return '<span class="offert-status-chip">Utkast</span>';
  }

  function rendera(p) {
    const rader = p.offert_rader || [];
    const datum = new Date(p.skapad_at).toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric' });
    const godkand = p.offert_status === 'godkand';

    document.title = `Offert — ${p.projektnamn}`;
    const år = new Date(p.skapad_at).getFullYear();
    const nr = String(p.offert_nummer).padStart(3, '0');
    document.getElementById('intro-nummer').textContent = `${år}-${nr}`;

    const totalt = rader.reduce((s, r) => s + (r.belopp || 0), 0);

    document.getElementById('offert-panel').innerHTML = `
      ${chipHTML(p.offert_status)}
      <h1 class="offert-rubrik">${p.projektnamn}</h1>
      <p class="offert-kund">${p.kundnamn} &nbsp;·&nbsp; ${datum}</p>
      <hr class="divider" />
      ${p.offert_meddelande ? `<p class="meddelande">${p.offert_meddelande.replace(/\n/g, '<br>')}</p><hr class="divider" />` : ''}

      <div class="rader-rubrik">
        <span></span>
        <span>Moment</span>
        <span style="text-align:right">Belopp</span>
        <span></span>
      </div>
      <div id="rader-lista">
        ${rader.map((r, i) => radHTML(r, i, false)).join('')}
      </div>

      ${!godkand ? `<button class="btn-lagg-till" onclick="läggTillRad()">+ Lägg till moment</button>` : ''}

      <div class="totalt-rad">
        <span class="totalt-label">Totalt</span>
        <span class="totalt-belopp" id="totalt-belopp">${new Intl.NumberFormat('sv-SE').format(totalt)} kr</span>
      </div>

      <div class="deko-bild">
        <img src="https://www.tegelochhatt.se/app/uploads/2024/11/mm-book-bk-c-03-2-1.webp" alt="" />
      </div>

      ${godkand
        ? `<div class="godkand-banner">
            <h3>Offerten är godkänd</h3>
            <p>Tack! Vi hör av oss för att komma igång.</p>
          </div>`
        : `<div class="godkann-sektion">
            <p>Bocka av de moment du vill ha med, lägg till egna om du vill, och godkänn sedan nedan.</p>
            <button class="btn-godkann" onclick="godkann()">Godkänn offert</button>
          </div>`
      }
    `;

    uppdateraTotalt();
  }

  function radHTML(r, i, nyRad) {
    const fmt = new Intl.NumberFormat('sv-SE').format(r.belopp);
    return `
      <div class="rad${nyRad ? ' ny' : ''}" id="rad-${i}">
        <input type="checkbox" class="rad-checkbox" checked onchange="uppdateraTotalt()" />
        <span class="rad-beskrivning">${r.beskrivning}</span>
        <span class="rad-belopp">${fmt} kr</span>
        <button class="rad-ta-bort" onclick="taBortRad(${i})" title="Ta bort">×</button>
      </div>`;
  }

  let extraRader = [];

  function läggTillRad() {
    const lista = document.getElementById('rader-lista');
    const i = lista.children.length;
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="ny-rad-form" id="ny-form-${i}">
        <input type="text" placeholder="Beskriv momentet" id="ny-beskr-${i}" />
        <input type="number" placeholder="Belopp" id="ny-belopp-${i}" />
      </div>
      <div style="display:flex;gap:8px;margin-top:6px;margin-bottom:8px;">
        <button class="btn-godkann" style="padding:7px 20px;font-size:0.82rem;" onclick="bekräftaNyRad(${i})">Lägg till</button>
        <button class="btn-lagg-till" style="width:auto;margin:0;" onclick="this.closest('div').previousSibling.remove();this.closest('div').remove()">Avbryt</button>
      </div>`;
    lista.appendChild(div);
  }

  function bekräftaNyRad(i) {
    const beskr = document.getElementById(`ny-beskr-${i}`).value.trim();
    const belopp = Number(document.getElementById(`ny-belopp-${i}`).value) || 0;
    if (!beskr) return;
    const lista = document.getElementById('rader-lista');
    const formContainer = document.getElementById(`ny-form-${i}`).parentElement;
    const nyIndex = lista.querySelectorAll('.rad').length;
    const radDiv = document.createElement('div');
    radDiv.innerHTML = radHTML({ beskrivning: beskr, belopp }, nyIndex, true);
    lista.insertBefore(radDiv.firstElementChild, formContainer);
    formContainer.remove();
    uppdateraTotalt();
  }

  function taBortRad(i) {
    const rad = document.getElementById(`rad-${i}`);
    if (rad) { rad.remove(); uppdateraTotalt(); }
  }

  function uppdateraTotalt() {
    const rader = document.querySelectorAll('#rader-lista .rad');
    let totalt = 0;
    rader.forEach(rad => {
      const checkbox = rad.querySelector('.rad-checkbox');
      const beloppEl = rad.querySelector('.rad-belopp');
      if (checkbox && beloppEl) {
        const checked = checkbox.checked;
        rad.classList.toggle('inaktiv', !checked);
        if (checked) {
          const belopp = parseInt(beloppEl.textContent.replace(/\s/g, '').replace('kr', '')) || 0;
          totalt += belopp;
        }
      }
    });
    const el = document.getElementById('totalt-belopp');
    if (el) el.textContent = new Intl.NumberFormat('sv-SE').format(totalt) + ' kr';
  }

  function läsAvJusteradeRader() {
    const rader = [];
    document.querySelectorAll('#rader-lista .rad').forEach(rad => {
      const checkbox = rad.querySelector('.rad-checkbox');
      if (!checkbox || !checkbox.checked) return;
      const beskr = rad.querySelector('.rad-beskrivning')?.textContent.trim();
      const beloppText = rad.querySelector('.rad-belopp')?.textContent || '0';
      const belopp = parseInt(beloppText.replace(/\s/g, '').replace('kr', '')) || 0;
      if (beskr) rader.push({ beskrivning: beskr, belopp });
    });
    return rader;
  }

  async function godkann() {
    const justeradeRader = läsAvJusteradeRader();
    const totalt = justeradeRader.reduce((s, r) => s + r.belopp, 0);
    const res = await fetch(`${URL}/rest/v1/projekt?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        offert_status: 'godkand',
        status: 'pagaende',
        offert_rader: justeradeRader,
        belopp: totalt
      })
    });
    if (res.ok) ladda();
  }

  function visaFel(text) {
    document.getElementById('offert-panel').innerHTML = `<div class="fel">${text}</div>`;
  }

  ladda();
</script>

</body>
</html>
